name: Formal Verification CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  GO_VERSION: "1.22"

jobs:
  # ── Unit Tests ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go mod tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -count=1 -race ./...

  # ── Determinism ─────────────────────────────────────────────────────────────
  determinism:
    name: Determinism
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Determinism tests
        run: go test -count=1 ./pkg/tests/... -v

  # ── TLA+ Spec Generation ────────────────────────────────────────────────────
  tla-spec:
    name: TLA+ Spec Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Generate TLA+ specs
        run: |
          mkdir -p artifacts
          go run pkg/formal/generate.go artifacts/

      - name: Upload TLA specs
        uses: actions/upload-artifact@v4
        with:
          name: tla-specs
          path: artifacts/*.tla

  # ── Model Checker ──────────────────────────────────────────────────────────
  model-checker:
    name: Model Checker
    runs-on: ubuntu-latest
    needs: tla-spec
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download TLA specs
        uses: actions/download-artifact@v4
        with:
          name: tla-specs
          path: artifacts/

      - name: Run Go model checker tests
        run: go test -count=1 ./pkg/modelchecker/... -v

      - name: Run Formal CI pipeline
        run: |
          # Run the full CI pipeline (generates model-check-report.json)
          go run -exec "" ./pkg/ci/ci.go 2>&1 || true
          # Artifacts are written to ./artifacts/

      - name: Upload model check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: model-check-report
          path: artifacts/model-check-report.json

  # ── WAL Crash Recovery ─────────────────────────────────────────────────────
  wal-recovery:
    name: WAL Crash Recovery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: WAL tests
        run: go test -count=1 ./pkg/wal/... -v

  # ── Long-Term Stress ───────────────────────────────────────────────────────
  stress:
    name: Long-Term Stress (ATOM-040)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Stress tests
        run: go test -count=1 ./pkg/stress/... -v -timeout=5m

  # ── Byzantine Simulation ───────────────────────────────────────────────────
  byzantine:
    name: Byzantine Simulation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Byzantine tests
        run: go test -count=1 ./pkg/byzantine/... -v

  # ── Integration Test ───────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Integration tests
        run: |
          # Ensure all packages build
          go build ./...
          # Run all tests
          go test -count=1 ./...

  # ── FAIL BUILD Gate ────────────────────────────────────────────────────────
  # This job gates the entire workflow on invariant satisfaction.
  # If any invariant violated → entire PR blocked.
  gate:
    name: Formal Verification Gate
    needs: [unit-tests, determinism, model-checker, wal-recovery, stress, byzantine, integration]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "=== JOB STATUS SUMMARY ==="
          # Report any failed jobs
          echo "If any job above failed, this gate will fail."
          echo "ATOM invariants required for merge: ALL PASS"
          echo ""
          echo "Pipeline complete."